name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        # Deliberately not installing torch/faiss — the tested modules (metrics,
        # config, fusion) are pure Python by design, so CI stays fast.
        run: pip install pytest pyyaml numpy

      - name: Run tests
        run: python -m pytest tests/ -v
