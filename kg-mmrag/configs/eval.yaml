# Evaluation configuration. Inherits from default.yaml; only overrides differ.

inherits: configs/default.yaml

evaluation:
  split: test
  batch_size: 16
  n_samples: null            # null = full split; set an int for a smoke test

  retrieval_metrics:
    - recall@1
    - recall@5
    - recall@10
    - mrr
    - ndcg@10

  generation_metrics:
    - accuracy
    - f1
    - rouge_l
    - bertscore

  hallucination:
    enabled: true
    report_per_modality: true

  # Ablations run by scripts/run_eval.py --ablations
  ablations:
    - name: no_retrieval
      retrieval: {dense: {enabled: false}, graph: {enabled: false}}
    - name: dense_only
      retrieval: {graph: {enabled: false}}
    - name: graph_only
      retrieval: {dense: {enabled: false}}
    - name: fused
      retrieval: {}            # default config = the full system

output:
  metrics_path: results/metrics.json
  figures_dir: results/figures/
  save_predictions: true
  predictions_path: results/predictions.jsonl
